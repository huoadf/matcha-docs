<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Page not found · Matcha docs</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23050505'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23ee8aff'/%3E%3C/svg%3E">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  
  <!-- Theme CSS -->
  <link rel="stylesheet" href="https://huoadf.github.io/matcha-docs/assets/main.css">
  <style>
    :root { --accent: #ee8aff; }
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--topbar-h) - 100px);
      text-align: center;
      padding: 40px 20px;
    }
    .error-code {
      font-size: 108px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      margin: 0 0 16px;
      letter-spacing: -0.04em;
    }
    .error-title {
      font-size: 24px;
      font-weight: 650;
      margin: 0 0 12px;
      color: var(--text);
    }
    .error-desc {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 440px;
      margin: 0 0 32px;
      line-height: 1.6;
    }
    .error-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 42px;
      padding: 0 20px;
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-size: 14px;
      transition: opacity 0.15s;
    }
    .error-btn:hover {
      opacity: 0.9;
      text-decoration: none;
    }
  </style>
  <script>
    (function(){try{var t=localStorage.getItem("wd-theme");if(t)document.documentElement.dataset.theme=t;}catch(e){}})();
  </script>
</head>
<body data-project="matcha">
  <header class="topbar">
    <a class="brand" href="https://huoadf.github.io/matcha-docs/">
      <span class="brand-dot" style="background:#ee8aff"></span>Matcha docs
    </a>
    <div class="topbar-spacer"></div>
    <button class="iconbtn" data-theme-toggle aria-label="Toggle theme">
      <span class="theme-sun">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
      </span>
      <span class="theme-moon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
        </svg>
      </span>
    </button>
  </header>
  
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Lost in the virtual machine</h1>
    <p class="error-desc">
      The address you are looking for doesn't exist in the Matcha memory space. It may have been relocated or garbage collected.
    </p>
    <a class="error-btn" href="https://huoadf.github.io/matcha-docs/">
      Back to safety
    </a>
  </div>
  
  <!-- theme toggler scripts -->
  <script>
    const root = document.documentElement;
    const toggles = document.querySelectorAll("[data-theme-toggle]");
    toggles.forEach(btn => btn.addEventListener("click", () => {
      const next = (root.dataset.theme || "dark") === "dark" ? "light" : "dark";
      root.dataset.theme = next;
      localStorage.setItem("wd-theme", next);
    }));
  </script>
</body>
</html>
